<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Auto-Shusher (MVP)</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            transition: background 0.1s;
        }
        
        /* The aggressive flash when triggered */
        body.alert-mode {
            background: #e94560;
        }

        h1 { margin-bottom: 5px; }
        p { color: #a9b0c0; margin-bottom: 30px; transition: color 0.1s; }
        body.alert-mode p { color: white; }
        
        .controls {
            background: #16213e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 300px;
            z-index: 10;
        }

        button {
            background: #4cd137;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            width: 100%;
            margin-bottom: 20px;
        }
        button:hover { background: #44bd32; }
        button:disabled { background: #7f8fa6; cursor: not-allowed; }
        
        .meter-container {
            width: 100%;
            height: 30px;
            background: #0f3460;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        #volume-bar {
            height: 100%;
            width: 0%;
            background: #4cd137;
            transition: width 0.1s, background 0.1s;
        }

        label { display: block; margin-bottom: 10px; font-weight: bold; }
        input[type=range] { width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Стига викали</h1>
    <p>Calibrate threshold. Too loud = Alarm.</p>

    <div class="controls">
        <button id="start-btn">Start Listening</button>
        
        <label>Live Room Volume</label>
        <div class="meter-container">
            <div id="volume-bar"></div>
        </div>

        <label for="threshold-slider">Alarm Threshold: <span id="threshold-display">80</span></label>
        <input type="range" id="threshold-slider" min="10" max="100" value="80">
    </div>

    <script>
        let audioContext;
        let analyser;
        let microphone;
        let isListening = false;
        let isAlarmPlaying = false;

        const startBtn = document.getElementById('start-btn');
        const volumeBar = document.getElementById('volume-bar');
        const thresholdSlider = document.getElementById('threshold-slider');
        const thresholdDisplay = document.getElementById('threshold-display');

        thresholdSlider.addEventListener('input', (e) => {
            thresholdDisplay.innerText = e.target.value;
        });

        startBtn.addEventListener('click', async () => {
            if (isListening) return; 
            
            try {
                // 1. Request microphone access
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // 2. Initialize Audio Engine strictly ON USER CLICK to bypass autoplay blocks
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }

                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                
                microphone.connect(analyser);
                analyser.fftSize = 256;
                
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);

                isListening = true;
                startBtn.innerText = "Monitoring Audio...";
                startBtn.disabled = true; // Lock button so they don't click it twice

                function monitorAudio() {
                    if (!isListening) return;
                    requestAnimationFrame(monitorAudio);

                    analyser.getByteFrequencyData(dataArray);

                    let sum = 0;
                    for (let i = 0; i < bufferLength; i++) {
                        sum += dataArray[i];
                    }
                    let averageVolume = sum / bufferLength;

                    // Convert raw audio data to a 0-100 percentage
                    let volumePercent = Math.min(100, Math.round((averageVolume / 128) * 100));

                    // Update visualizer
                    volumeBar.style.width = volumePercent + "%";
                    
                    const threshold = parseInt(thresholdSlider.value);
                    if (volumePercent > threshold - 10) {
                        volumeBar.style.background = "#e94560"; // Danger Zone
                    } else {
                        volumeBar.style.background = "#4cd137"; // Safe Zone
                    }

                    // TRIGGER THE SYNTHESIZED ALARM
                    if (volumePercent >= threshold && !isAlarmPlaying) {
                        triggerAlarm();
                    }
                }

                monitorAudio();

            } catch (err) {
                alert("Microphone access denied. You must allow mic access for this to work.");
                console.error(err);
            }
        });

        // --- THE MVP ALARM GENERATOR ---
        function triggerAlarm() {
            isAlarmPlaying = true;
            
            // Visual trigger: Turn background red
            document.body.classList.add('alert-mode');
            
            // Create a harsh 'square' wave oscillator (like a fire alarm buzzer)
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.type = 'square';
            oscillator.frequency.setValueAtTime(600, audioContext.currentTime); // Pitch (Hz)
            
            gainNode.gain.setValueAtTime(1.0, audioContext.currentTime); // Max internal volume
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            // Start the alarm
            oscillator.start();
            
            // Stop the alarm after 1.5 seconds
            setTimeout(() => {
                oscillator.stop();
                document.body.classList.remove('alert-mode'); // Remove red background
                
                // 3-second cooldown before it can trigger again
                setTimeout(() => {
                    isAlarmPlaying = false;
                }, 3000);
                
            }, 1500);
        }
    </script>
</body>
</html>
